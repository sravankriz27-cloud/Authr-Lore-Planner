<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" /> <!-- deep indigo -->
      <stop offset="100%" stop-color="#0f172a" /> <!-- slate/black -->
    </linearGradient>
    <!-- Quill/A Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <!-- Glow/Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#f59e0b" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="48" height="48" rx="12" fill="url(#bgGrad)" />
  
  <!-- Outer glowing ring / boundary -->
  <rect x="2" y="2" width="44" height="44" rx="10" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5" />

  <!-- Magic Sparkles/Stars -->
  <!-- Top Right Star -->
  <path d="M36 10 L37.5 12.5 L40 13 L37.5 13.5 L36 16 L34.5 13.5 L32 13 L34.5 12.5 Z" fill="#fbbf24" opacity="0.8" />
  <!-- Bottom Left Star -->
  <path d="M12 34 L13 36 L15 36.5 L13 37 L12 39 L11 37 L9 36.5 L11 36 Z" fill="#f59e0b" opacity="0.6" />

  <!-- The Letter "A" Styled as an Elegant Quill Pen -->
  <g filter="url(#glow)">
    <!-- Main Quill Pen / "A" Left Leg and curve -->
    <path d="M24 8 C20 18 13 28 13 34 C13 38 17 39 21 39 C24 39 24 37 24 35" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" />
    <!-- "A" Right Leg and loop -->
    <path d="M24 8 C28 18 35 28 35 34 C35 38 31 39 27 39 C24 39 24 37 24 35" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" />
    <!-- "A" Horizontal crossbar (stylized as ink slit/quill wings) -->
    <path d="M17 28 C21 28 27 28 31 28" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Quill Nib Slit -->
    <path d="M24 8 L24 20" fill="none" stroke="#1e1b4b" stroke-width="1.5" stroke-linecap="round" />
  </g>

  <!-- Accent center dot -->
  <circle cx="24" cy="28" r="1.5" fill="#ffffff" />
</svg>
